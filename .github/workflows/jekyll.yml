name: Build and deploy to GitHub Pages

# Builds the site with our own Jekyll (4.4.1) + jekyll-minifier instead of the
# native GitHub Pages build, then publishes the result to Pages.
# Requires: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one production deploy at a time; never cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false   # we add the Linux platform to the lock before installing

      # The committed Gemfile.lock is generated on Windows (x64-mingw-ucrt only), so the
      # Linux runner must add its own platform before Bundler will install. This resolves
      # the Linux gem variants at build time without rewriting the committed lockfile.
      - name: Install gems
        run: |
          bundle lock --add-platform x86_64-linux
          bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
