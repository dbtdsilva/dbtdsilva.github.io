# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Diogo Silva | Resume, Works, Experience
description: "Diogo Silva — Lead Software Development Engineer based in Switzerland, working with Java, Spring, Kafka and Kubernetes. Resume, projects and experience."
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dsilva.pt" # the base hostname & protocol for your site
twitter_username: dbtdsilva
github_username:  dbtdsilva
cloudflare_analytics_token: "b5ee31fd1cf44bacb275ce5e8a01590d" # Cloudflare Web Analytics beacon token (public, not a secret).

# Build settings
markdown: kramdown
#theme: minima

# Source files for the wordcloud generator app — keep out of the published site.
exclude:
  - wordcloud.csv
  - wordcloud.wcld2

plugins:
  - jekyll-minifier
